server:
  port: 8080
  max-http-header-size: 16KB
  tomcat:
    max-http-form-post-size: 20MB

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  application:
    name: api-gateway
  codec:
    max-in-memory-size: 20MB
  cloud:
    gateway:
      httpclient:
        max-in-memory-size: 20971520
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: crm-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/clientes/**,/api/fornecedores/**,/api/entidades/**
        - id: commercial-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/propostas/**,/api/situacoes-proposta/**,/api/itens-proposta/**,/api/produtos/**,/api/formas-pagamento/**
        - id: financial-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/contas-pagar/**,/api/contas-receber/**,/api/fluxo-caixa/**,/api/financial/**
        - id: frontend
          uri: http://localhost:4200
          predicates:
            - Path=/**
