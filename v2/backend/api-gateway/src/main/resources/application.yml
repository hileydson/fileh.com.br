server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: crm-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/clientes/**, /api/fornecedores/**, /api/entidades/**
        - id: commercial-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/propostas/**, /api/situacoes-proposta/**, /api/itens-proposta/**, /api/produtos/**, /api/formas-pagamento/**
        - id: financial-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/contas-pagar/**, /api/contas-receber/**, /api/fluxo-caixa/**
        - id: frontend
          uri: http://localhost:4200
          predicates:
            - Path=/**
