server:
  port: 8082

spring:
  application:
    name: crm-service
  datasource:
    # URL de conexão. Idealmente apontando para o mesmo banco de dados ou um específico para crm.
    url: jdbc:mysql://localhost:3306/fileh_v2?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: camila
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # create, create-drop, update, validate ou none
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
