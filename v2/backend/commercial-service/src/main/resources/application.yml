server:
  port: 8083
  max-http-header-size: 16KB
  tomcat:
    max-http-form-post-size: 20MB
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

spring:
  application:
    name: commercial-service
  codec:
    max-in-memory-size: 20MB
  datasource:
    url: jdbc:mysql://localhost:3306/fileh_v2?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: camila
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
