server:
  port: 8081
  max-http-header-size: 16KB

spring:
  application:
    name: auth-service
  datasource:
    # URL de conexão com o MySQL. Mude localhost e 3306 se o seu banco estiver em outro servidor/porta
    url: jdbc:mysql://localhost:3306/fileh_v2?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: camila
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # create, create-drop, update, validate ou none (Recomendado update para desenvolvimento inicial)
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

fileh:
  app:
    # Segredo para gerar e validar os tokens JWT (Use uma Hash Base64 forte em produção)
    jwtSecret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    jwtExpirationMs: 86400000 # 24 horas em milissegundos
