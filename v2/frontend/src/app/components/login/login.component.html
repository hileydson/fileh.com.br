<div class="min-h-screen bg-slate-100 flex items-center justify-center p-4 bg-gradient-to-br from-slate-100 to-slate-200">
  <div class="max-w-md w-full glass-panel overflow-hidden transform transition-all">
    <div class="px-8 pt-8 pb-6 bg-white/50 border-b border-slate-100/50 flex flex-col items-center">
      <div class="w-16 h-16 bg-gradient-to-br from-primary-500 to-primary-600 border border-primary-400 rounded-2xl flex items-center justify-center shadow-lg shadow-primary-500/30 mb-4 transform -rotate-6 group-hover:rotate-0 transition-transform">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path>
        </svg>
      </div>
      <h2 class="text-3xl font-bold text-slate-800 text-center">Boas-vindas</h2>
      <p class="text-slate-500 text-sm mt-1 text-center">Acesse o Fileh Systems V2</p>
      <p class="text-slate-400 text-[10px] font-bold mt-2 uppercase tracking-widest">v2.1.23</p>
    </div>

    <form class="p-8 space-y-6" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Usuário</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            [(ngModel)]="credentials.username" 
            required
            class="input-field" 
            placeholder="Digite seu usuário">
        </div>

        <div>
           <div class="flex justify-between items-center mb-1">
             <label for="password" class="block text-sm font-medium text-slate-700">Senha</label>
             <a href="#" class="text-xs font-semibold text-primary-600 hover:text-primary-500">Esqueci a senha?</a>
           </div>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="credentials.password" 
            required
            class="input-field" 
            placeholder="••••••••">
        </div>
      </div>

      <div class="text-center" *ngIf="errorMessage">
        <p class="text-red-500 text-sm font-medium">{{errorMessage}}</p>
      </div>

      <button 
        type="submit" 
        [disabled]="loading"
        class="w-full btn-primary flex justify-center py-3">
        <svg *ngIf="loading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        {{ loading ? 'Entrando...' : 'Entrar na Plataforma' }}
      </button>
    </form>
  </div>
</div>
