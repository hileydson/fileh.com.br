<div class="min-h-screen bg-slate-50 flex flex-col md:flex-row">
  
  <!-- Sidebar -->
  <aside class="w-full md:w-64 bg-slate-900 text-white flex flex-col transition-all duration-300 shadow-2xl z-20 sticky top-0 md:h-screen">
    <div class="h-20 flex items-center px-6 border-b border-slate-800">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center mr-3 shadow-lg shadow-primary-500/20">
         <span class="font-bold text-white leading-none">FS</span>
      </div>
      <span class="text-xl font-bold tracking-tight">Fileh Systems</span>
    </div>
    
    <nav class="flex-1 px-4 py-8 space-y-2 overflow-y-auto font-sans">
      
      <!-- Seção Administrativo -->
      <div class="pb-2">
        <span class="px-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Administrativo</span>
      </div>

      <a *ngIf="isAdmin" routerLink="/fornecedores" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        <span class="font-medium">Fornecedores</span>
      </a>

      <a *ngIf="isAdmin" routerLink="/entidades" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
        <span class="font-medium">Entidades</span>
      </a>

      <a *ngIf="isAdmin" routerLink="/contas-pagar" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="font-medium">Contas a Pagar</span>
      </a>

      <a *ngIf="isAdmin" routerLink="/contas-receber" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="font-medium">Contas a Receber</span>
      </a>

      <a *ngIf="isAdmin" routerLink="/usuarios" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <span class="font-medium">Usuários</span>
      </a>

      <!-- Seção Vendas -->
      <div class="pt-6 pb-2">
        <span class="px-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Vendas</span>
      </div>

      <a routerLink="/fluxo-caixa" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        <span class="font-medium">Fluxo de Caixa</span>
      </a>

      <a routerLink="/propostas" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        <span class="font-medium">Proposta Comercial</span>
      </a>

      <a routerLink="/produtos" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        <span class="font-medium">Produtos</span>
      </a>

      <a *ngIf="isAdmin" routerLink="/vendas-config" routerLinkActive="bg-primary-600 text-white" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924-1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        <span class="font-medium">Configurações</span>
      </a>

      <!-- Clientes removidos do topo manual, agora estão no Vendas ou Administrativo? 
           O usuário não citou Clientes no menu Administrativo ou Vendas, mas é CRM. 
           Vou deixar Clientes escondido ou em uma seção CRM se ele pedir, 
           mas no momento vou seguir estritamente o que ele pediu. -->
    </nav>
    
    <div class="p-4 border-t border-slate-800">
      <button (click)="logout()" class="flex items-center w-full px-4 py-3 text-slate-400 hover:text-red-400 hover:bg-slate-800 hover:bg-opacity-50 rounded-lg transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        <span class="font-medium">Sair do Sistema</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50">
    <header class="h-20 bg-white shadow-sm border-b border-slate-200 flex items-center justify-between px-8 z-10 shrink-0">
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">{{ entidadeNome }}</h1>
      <div class="flex items-center space-x-3">
        <span class="text-sm font-semibold text-slate-600 hidden sm:block">{{ username }}</span>
        <div class="h-10 w-10 rounded-full bg-slate-100 flex items-center justify-center border-2 border-primary-100 text-primary-700 font-bold shadow-inner uppercase">
           {{ username.substring(0, 1) }}
        </div>
      </div>
    </header>
    
    <div class="flex-1 overflow-auto p-4 md:p-8">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
</div>
